<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escaramuza – Menú Interactivo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f9f6f1;
      color: #2c1a0e;
      min-height: 100vh;
    }

    /* Barra de Idiomas */
    #lang-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e8e0d5;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 12px;
      border: 1px solid #f0e8dc;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      background: #f5f0ea;
      color: #5a3e28;
      transition: all 0.2s;
    }
    .lang-btn.active { background: #2c1a0e; color: #fff; border-color: #2c1a0e; }

    header {
      text-align: center;
      padding: 40px 20px 28px;
    }
    header img {
      max-width: 280px;
      width: 70%;
      margin: 0 auto 16px;
      display: block;
    }
    .header-line {
      width: 48px; height: 2px;
      background: #c8a97e;
      margin: 12px auto;
    }
    header p {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: #9a7d5e;
      text-transform: uppercase;
    }

    /* Barra de Categorías */
    #tab-bar {
      display: flex;
      overflow-x: auto;
      justify-content: flex-start;
      gap: 10px;
      padding: 0 16px 24px;
      max-width: 1000px;
      margin: 0 auto;
      scrollbar-width: none; /* Firefox */
    }
    #tab-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .tab-btn {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #ddd3c7;
      background: #fff;
      color: #7a6050;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
    }
    .tab-btn svg { width: 18px; height: 18px; }
    .tab-btn.active {
      background: #2c1a0e; color: #fff;
      border-color: #2c1a0e;
      box-shadow: 0 4px 12px rgba(44,26,14,0.15);
    }

    /* Carta del Menú */
    #menu-card {
      max-width: 900px;
      margin: 0 auto 48px;
      padding: 0 16px;
    }
    .card-inner {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #ece5db;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
      padding: 24px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f3ede5;
      padding-bottom: 20px;
      margin-bottom: 24px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.5rem;
      font-weight: 400;
    }
    .card-title svg { width: 28px; height: 28px; }

    /* Items */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .menu-item {
      padding-bottom: 12px;
      border-bottom: 1px solid #f9f6f1;
    }
    .menu-item-top {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .menu-item-price { color: #b0a090; font-style: italic; }
    .menu-item-desc { font-size: 0.85rem; color: #8a7060; font-style: italic; line-height: 1.4; }
    .menu-item-options { font-size: 0.8rem; color: #c8a97e; margin-top: 4px; font-weight: 700; }

    /* Secciones Especiales */
    .section-block-title {
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c8a97e;
      margin: 30px 0 15px;
      border-bottom: 1px solid #f0e8dc;
      padding-bottom: 5px;
    }

    .agregados-box {
      margin-top: 30px;
      background: #fdfaf7;
      padding: 15px;
      border-radius: 12px;
      border: 1px dashed #ddd3c7;
    }
    .agregado-chip {
      display: inline-block;
      background: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      margin: 4px;
      font-size: 0.8rem;
      border: 1px solid #eee;
    }

    footer { text-align: center; padding: 30px; color: #b0a090; font-size: 0.7rem; letter-spacing: 2px; }

    @media (max-width: 600px) {
      .items-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="lang-bar"></div>

<header>
  <img src="Logo - Naranja.png" alt="Escaramuza"/>
  <div class="header-line"></div>
  <p id="subtitle">MENÚ</p>
</header>

<div id="tab-bar"></div>
<div id="menu-card"><div class="card-inner" id="card-inner"></div></div>
<footer id="footer-text"></footer>

<script>
const languages = [
  {code:'es',name:'Español',flag:'🇪🇸'},
  {code:'en',name:'English',flag:'🇬🇧'}
];

const ICONS = {
  coffee: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>`,
  leaf: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 4 13V5a2 2 0 0 1 2-2h5c3.87 0 7 3.13 7 7 0 5.25-4.67 10-11 10zM11 3v17"/></svg>`,
  drop: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`,
  wind: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>`,
  cake: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8M2 21h20M7 8V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v3"/></svg>`,
  food: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 3v10M18 17v4M14 3v10c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2V3M2 20h10M5 3v17M9 3v17"/></svg>`,
  bubble: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="8" cy="9" r="1"/><circle cx="16" cy="9" r="1"/><circle cx="12" cy="15" r="1"/></svg>`,
  wine: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 22h8M12 11v11M7 3h10c0 4-2 8-5 8s-5-4-5-8z"/></svg>`,
  cocktail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-12l6 10zm-6 10v10m-5 0h10"/></svg>`,
  info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
};

const ICON_COLORS = ['#92400e','#16a34a','#2563eb','#d97706','#be123c','#b45309','#06b6d4','#b91c1c','#7c3aed'];

const TR = {
  es: {
    subtitle: "BEBIDAS Y COCINA",
    footer: "Precios con IVA incluido.",
    supplement: "Suplemento leche de Avena o Almendra: +0,30 €",
    tabs: ["Cafetería","Matcha Bar","Zumos y Limonadas","Tés","Nuestra Cocina","Obrador","Refrescos","Vinos","Bar de Autor"],
    extras: "+ Agregados"
  },
  en: {
    subtitle: "DRINKS & FOOD",
    footer: "Prices include VAT.",
    supplement: "Oat or Almond milk supplement: +0.30 €",
    tabs: ["Coffee Bar","Matcha Bar","Juices & Lemonades","Teas","Our Kitchen","Bakery","Soft Drinks","Wines","Author Bar"],
    extras: "+ Add-ons"
  }
};

function getMenu(lang) {
  const t = TR[lang] || TR.es;
  return [
    {
      title: t.tabs[0], icon: ICONS.coffee, color: ICON_COLORS[0],
      notes: t.supplement,
      items: [
        {name: lang==='es'?"Espresso Doble":"Double Espresso", price:"2.80 €", desc: lang==='es'?"Concentrado y potente.":"Strong and concentrated."},
        {name: "Flat White", price:"3.20 €", desc: lang==='es'?"Doble espresso con leche sedosa.":"Double espresso with silky milk."},
        {name: "Cold Brew", price:"4.00 €", desc: lang==='es'?"Macerado 24h en frío.":"24h cold-steeped coffee."},
        {name: "Iced Latte", price:"4.50 €", options: lang==='es'?"Vainilla · Caramelo · Coco":"Vanilla · Caramel · Coconut"}
      ]
    },
    {
      title: t.tabs[4], icon: ICONS.food, color: ICON_COLORS[4],
      flatSections: [
        {
          title: lang==='es'?"Nuestra Cocina":"Our Kitchen",
          items: [
            {name: lang==='es'?"Milanesa de Babilla":"Sirloin Tip Milanesa", price:"13.90 €", desc: lang==='es'?"Tierna ternera rebozada con patatas.":"Tender breaded beef served with fries."},
            {name: lang==='es'?"Oro Ibérico":"Iberian Gold", price:"13.90 €", desc: lang==='es'?"Jamón y kaki sobre ricotta y miel.":"Iberian ham & persimmon with honey."},
            {name: "Benedictos", price:"11.50 €", desc: lang==='es'?"Huevos con salsa holandesa.":"Eggs with hollandaise sauce."}
          ]
        }
      ],
      agregados: [{name:lang==='es'?"Huevo":"Egg", price:"1.50 €"}, {name:lang==='es'?"Aguacate":"Avocado", price:"2.50 €"}],
      agregadosTitle: t.extras
    },
    {
      title: t.tabs[5], icon: ICONS.cake, color: ICON_COLORS[5],
      items: [
        {name: "Cinnamon Roll", price:"4.50 €", options: "Lotus · Nut · Red Berries"},
        {name: lang==='es'?"Tarta de Queso con Brownie":"Brownie Cheesecake", price:"4.90 €"},
        {name: "Carrot Cake", price:"4.50 €"}
      ]
    }
  ];
}

let currentLang = 'es';
let currentTab = 0;

function render() {
  const t = TR[currentLang] || TR.es;
  const menu = getMenu(currentLang);
  const cat = menu[currentTab] || menu[0];

  // Render Lang Bar
  document.getElementById('lang-bar').innerHTML = languages.map(l => 
    `<button class="lang-btn ${l.code===currentLang?'active':''}" onclick="changeLang('${l.code}')">${l.flag} ${l.name}</button>`
  ).join('');

  // Render Tabs
  document.getElementById('tab-bar').innerHTML = menu.map((c, i) => 
    `<button class="tab-btn ${i===currentTab?'active':''}" onclick="changeTab(${i})" style="color:${c.color}">${c.icon} ${c.title}</button>`
  ).join('');

  // Render Card
  let bodyHTML = '';
  if (cat.flatSections) {
    bodyHTML = cat.flatSections.map(sec => `
      <div class="section-block-title">${sec.title}</div>
      <div class="items-grid">${sec.items.map(it => `
        <div class="menu-item">
          <div class="menu-item-top"><span>${it.name}</span><span>${it.price}</span></div>
          <div class="menu-item-desc">${it.desc || ''}</div>
        </div>`).join('')}</div>
    `).join('');
    if (cat.agregados) {
      bodyHTML += `<div class="agregados-box"><div class="section-block-title" style="margin-top:0">${cat.agregadosTitle}</div>` + 
        cat.agregados.map(a => `<span class="agregado-chip">${a.name} <b>${a.price}</b></span>`).join('') + `</div>`;
    }
  } else {
    bodyHTML = `<div class="items-grid">${cat.items.map(it => `
      <div class="menu-item">
        <div class="menu-item-top"><span>${it.name}</span><span>${it.price}</span></div>
        <div class="menu-item-desc">${it.desc || ''}</div>
        ${it.options ? `<div class="menu-item-options">● ${it.options}</div>` : ''}
      </div>`).join('')}</div>`;
  }

  document.getElementById('card-inner').innerHTML = `
    <div class="card-header"><div class="card-title" style="color:${cat.color}">${cat.icon} ${cat.title}</div></div>
    ${bodyHTML}
    ${cat.notes ? `<div style="margin-top:20px; font-size:0.8rem; color:#9a7d5e">${ICONS.info} ${cat.notes}</div>` : ''}
  `;

  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} Escaramuza Coffee Bar · ${t.footer}`;
}

function changeLang(code) { currentLang = code; render(); }
function changeTab(idx) { currentTab = idx; render(); }

render();
</script>
</body>
</html>
