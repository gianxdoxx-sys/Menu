<head>
  <meta charset="UTF-8"/>

  <title>Escaramuza – Menú</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f9f6f1;
      color: #2c1a0e;
      min-height: 100vh;
    }

    /* ── IDIOMAS ── */
    #lang-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e8e0d5;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      background: #f5f0ea;
      color: #5a3e28;
      transition: all 0.2s;
    }

    .lang-btn:hover { background: #e8dfd3; }
    .lang-btn.active { background: #2c1a0e; color: #fff; }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 40px 20px 28px;
    }

    header img {
      max-width: 320px;
      width: 80%;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .header-line {
      width: 48px;
      height: 2px;
      background: #c8a97e;
      margin: 12px auto;
    }

    header p {
      font-size: 0.78rem;
      letter-spacing: 4px;
      color: #9a7d5e;
      font-style: italic;
    }

    /* ── TABS ── */
    #tab-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 0 16px 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1.5px solid #ddd3c7;
      background: #fff;
      color: #7a6050;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      font-family: Georgia, serif;
    }

    .tab-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-btn:hover { background: #f5ede3; }
    .tab-btn.active { background: #2c1a0e; color: #fff; border-color: #2c1a0e; box-shadow: 0 4px 14px rgba(44,26,14,0.18); }

    /* ── CARD ── */
    #menu-card {
      max-width: 900px;
      margin: 0 auto 48px;
      padding: 0 16px;
    }

    .card-inner {
      background: #fff;
      border-radius: 32px;
      border: 1px solid #ece5db;
      box-shadow: 0 8px 40px rgba(44,26,14,0.07);
      padding: clamp(24px, 6vw, 56px);
      min-height: 480px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f3ede5;
      padding-bottom: 24px;
      margin-bottom: 32px;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 300;
      color: #2c1a0e;
    }

    .card-title svg { width: 24px; height: 24px; flex-shrink: 0; }

    .card-price-global {
      font-size: 1.5rem;
      color: #ccc0b0;
      font-style: italic;
      font-weight: 300;
    }

    /* ── ITEMS GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0 56px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding-bottom: 16px;
      margin-bottom: 4px;
      border-bottom: 1px solid #f5f0ea;
    }

    .menu-item-name {
      font-size: 1rem;
      font-weight: 500;
      color: #2c1a0e;
      line-height: 1.4;
    }

    .menu-item-price {
      color: #b0a090;
      font-style: italic;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── SUBCATEGORIES (Tés) ── */
    .sub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .subcat {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subcat-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subcat-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-black  { background: #3f3f46; }
    .dot-green  { background: #10b981; }
    .dot-gold   { background: #fbbf24; }
    .dot-amber  { background: #ea580c; }

    .subcat-name {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #2c1a0e;
    }

    .subcat-tag {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a8070;
    }

    .subcat-profile {
      font-size: 0.78rem;
      color: #7a6a58;
      font-style: italic;
      line-height: 1.5;
      background: #f9f5f0;
      border-left: 3px solid #ddd3c7;
      padding: 8px 12px;
      border-radius: 0 8px 8px 0;
    }

    .subcat ul { list-style: none; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

    .subcat li {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: #4a3828;
    }

    .subcat li span.p { color: #c0b0a0; font-style: italic; }

    /* ── NOTA ── */
    .card-note {
      margin-top: 40px;
      padding: 16px 20px;
      background: #f9f5f0;
      border: 1px solid #ece5db;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: #7a6a58;
      font-weight: 500;
    }

    .card-note svg { width: 18px; height: 18px; color: #b0a090; flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c0b0a0;
    }

    @media (max-width: 520px) {
      .items-grid { grid-template-columns: 1fr; gap: 0; }
      .sub-grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>

let currentLang = 'es';
let currentTab  = 0;

function renderLangBar() {
  document.getElementById('lang-bar').innerHTML = languages.map(l => `
    <button class="lang-btn ${l.code===currentLang?'active':''}" onclick="changeLang('${l.code}')">
      <span>${l.flag}</span><span>${l.name}</span>
    </button>`).join('');
}

function renderHeader() {
  document.getElementById('subtitle').textContent = T[currentLang].subtitle;
}

function renderTabs() {
  const menu = getMenu(currentLang);
  document.getElementById('tab-bar').innerHTML = menu.map((cat,idx) => `
    <button class="tab-btn ${idx===currentTab?'active':''}" onclick="changeTab(${idx})" style="${ICON_COLORS[idx]}">
      ${cat.icon} ${cat.title}
    </button>`).join('');
}

function renderCard() {
  const menu = getMenu(currentLang);
  const cat  = menu[currentTab];
  const card = document.getElementById('card-inner');

  let priceHTML = cat.globalPrice ? `<span class="card-price-global">${cat.globalPrice}</span>` : '';
  let bodyHTML  = '';

  if (cat.subcategories) {
    bodyHTML = `<div class="sub-grid">${cat.subcategories.map(sub=>`
      <div class="subcat">
        <div class="subcat-header">
          <div class="subcat-dot ${sub.dot}"></div>
          <div>
            <div class="subcat-name">${sub.name}</div>
            <div class="subcat-tag">${sub.tag}</div>
          </div>
        </div>
        <div class="subcat-profile">${sub.profile}</div>
        <ul>${sub.items.map(it=>`
          <li><span>${it}</span><span class="p">${cat.globalPrice}</span></li>`).join('')}
        </ul>
      </div>`).join('')}
    </div>`;
  } else if (cat.simpleItems) {
    bodyHTML = `<div class="items-grid">${cat.simpleItems.map(name=>`
      <div class="menu-item">
        <span class="menu-item-name">${name}</span>
        <span class="menu-item-price">${cat.globalPrice}</span>
      </div>`).join('')}
    </div>`;
  } else {
    bodyHTML = `<div class="items-grid">${cat.items.map(it=>`
      <div class="menu-item">
        <span class="menu-item-name">${it.name}</span>
        <span class="menu-item-price">${it.price}</span>
      </div>`).join('')}
    </div>`;
  }

  const noteHTML = cat.notes ? `
    <div class="card-note">${ICONS.info}<p>${cat.notes}</p></div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title" style="${ICON_COLORS[currentTab]}">${cat.icon} ${cat.title}</div>
      ${priceHTML}
    </div>
    ${bodyHTML}
    ${noteHTML}`;
}

function renderFooter() {
  document.getElementById('footer-text').textContent =
    `© ${new Date().getFullYear()} Escaramuza Coffee Bar · ${T[currentLang].footer}`;
}

function render() {
  renderLangBar();
  renderHeader();
  renderTabs();
  renderCard();
  renderFooter();
}

function changeLang(code) { currentLang=code; currentTab=0; render(); }
function changeTab(idx)   { currentTab=idx; renderTabs(); renderCard(); }

render();
</script>
